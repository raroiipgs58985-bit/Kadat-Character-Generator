name: Unpack regiment link

on:
  push:
    branches:
      - agent/multiple-drawbacks-repeatable-supply
  pull_request:
    branches:
      - main

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unpack bridge source
        run: node tools/unpack-regiment-character-link.cjs
      - name: Upload working sources
        uses: actions/upload-artifact@v4
        with:
          name: regiment-working-sources
          path: |
            diagnostic-artifact/regiment-character-link.js
            regiment-mode.js
            tests/regiment-character-link-check.mjs
            index.html
          if-no-files-found: error
