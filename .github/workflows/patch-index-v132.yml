name: Patch index for v1.3.2

on:
  push:
    branches:
      - agent/fix-regiment-runtime-v2

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-regiment-runtime-v2

      - name: Patch cache versions and field alias loader
        shell: python
        run: |
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          text = text.replace("regiment-character-link.css?v=1.3.1", "regiment-character-link.css?v=1.3.2")
          text = text.replace("COGITATOR V 1.3.1", "COGITATOR V 1.3.2")
          text = text.replace("final-dossier-cleanup.js?v=1.3.1", "final-dossier-cleanup.js?v=1.3.2")
          text = text.replace("regiment-mode.js?v=1.3.1", "regiment-mode.js?v=1.3.2")
          text = text.replace("regiment-character-link-packed/chunk-01.js?v=1.3.1", "regiment-character-link-packed/chunk-01.js?v=1.3.2")
          text = text.replace("regiment-character-link-packed/chunk-02.js?v=1.3.1", "regiment-character-link-packed/chunk-02.js?v=1.3.2")
          text = text.replace("regiment-character-link-packed/chunk-03.js?v=1.3.1", "regiment-character-link-packed/chunk-03.js?v=1.3.2")
          text = text.replace("regiment-character-link-loader.js?v=1.3.1", "regiment-character-link-loader.js?v=1.3.2")
          marker = '  <script src="regiment-data/index.js?v=1.2.0"></script>\n'
          alias = '  <script src="regiment-data-field-aliases.js?v=1.3.2"></script>\n'
          if alias not in text:
              text = text.replace(marker, marker + alias)
          path.write_text(text, encoding="utf-8")

      - name: Commit patched index
        shell: bash
        run: |
          if git diff --quiet -- index.html; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Load regiment field aliases in v1.3.2"
          git push origin HEAD:agent/fix-regiment-runtime-v2
