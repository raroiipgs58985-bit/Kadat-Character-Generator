name: Validate web app

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-negative-supply

      - name: Apply negative supply fix
        run: python tools/apply-negative-supply-fix.py

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          find . -maxdepth 1 -name '*.js' -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done
          find tests -type f \( -name '*.mjs' -o -name '*.cjs' \) -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done
          find regiment-data -type f \( -name '*.js' -o -name '*.cjs' \) -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done
          find regiment-character-link-packed -type f -name '*.js' -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Check advancement catalogs
        run: node tests/catalog-check.mjs

      - name: Check regiment data
        run: node regiment-data/validate-data.cjs

      - name: Check regiment budget
        run: node tests/regiment-budget-check.cjs

      - name: Check regiment-character link
        run: node tests/regiment-character-link-check.mjs

      - name: Check referenced local assets
        shell: python
        run: |
          from pathlib import Path
          import re

          html = Path("index.html").read_text(encoding="utf-8")
          paths = re.findall(r'(?:src|href)="([^"?]+)', html)
          missing = [path for path in paths if not path.startswith(("http://", "https://")) and not Path(path).exists()]
          if missing:
              raise SystemExit("Missing local assets: " + ", ".join(missing))
          print(f"Assets OK: {len(paths)} references checked.")

      - name: Commit generated fix
        shell: bash
        run: |
          set -euo pipefail
          git add regiment-mode.js regiment-budget.js tests/regiment-budget-check.cjs index.html
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Не допускать отрицательные очки снабжения"
          git push origin HEAD:agent/fix-negative-supply
