name: Validate web app

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          find . -maxdepth 1 -name '*.js' -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done
          find tests -name '*.mjs' -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done
          find regiment-data -type f \( -name '*.js' -o -name '*.cjs' \) -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done
          find regiment-character-link-packed -type f -name '*.js' -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

      - name: Check advancement catalogs
        run: node tests/catalog-check.mjs

      - name: Check regiment data
        run: node regiment-data/validate-data.cjs

      - name: Check regiment-character link
        run: node tests/regiment-character-link-check.mjs

      - name: Unpack regiment-character bridge for diagnostics
        run: node tools/unpack-regiment-link.cjs

      - name: Upload bridge diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: regiment-character-link-source
          path: diagnostic-artifact/regiment-character-link-source.js
          if-no-files-found: error

      - name: Check referenced local assets
        shell: python
        run: |
          from pathlib import Path
          import re

          html = Path("index.html").read_text(encoding="utf-8")
          paths = re.findall(r'(?:src|href)="([^"?]+)', html)
          missing = [path for path in paths if not path.startswith(("http://", "https://")) and not Path(path).exists()]
          if missing:
              raise SystemExit("Missing local assets: " + ", ".join(missing))
          print(f"Assets OK: {len(paths)} references checked.")
